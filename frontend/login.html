<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevTrack - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

.card {
    width: 380px;
    border-radius: 15px;
}

.title {
    font-weight: bold;
    color: #2a5298;
}

.toggle-btn {
    cursor: pointer;
    color: #2a4298;
    text-decoration: underline;
}

.loading {
    display: none;
}
</style>

</head>

<body>
<div class="card shadow p-4">

<h3 class="text-center title mb-3">DevTrack</h3>

<div id="loginForm">
    <input id="login_username" class="form-control mb-2" placeholder="Username">
    <input id="login_password" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-primary w-100 mb-2" onclick="login()">Login</button>

    <p class="text-center">
        New user? <span class="toggle-btn" onclick="showRegister()">Register</span>
    </p>
</div>

<div id="registerForm" style="display:none;">
    <input id="reg_username" class="form-control mb-2" placeholder="Username">
    <input id="reg_password" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-warning w-100 mb-2" onclick="register()">Register</button>

    <p class="text-center">
        Already have an account? <span class="toggle-btn" onclick="showLogin()">Login</span>
    </p>
</div>

<!-- LOADING -->
<div class="text-center loading" id="loading">
    <div class="spinner-border text-primary"></div>
</div>

</div>

<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
  <div id="toast" class="toast align-items-center text-white bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script>

function showRegister() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
}

function showLogin() {
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
}

// LOGIN
async function login() {
    const username = document.getElementById('login_username').value;
    const password = document.getElementById('login_password').value;

    toggleLoading(true);

    try {
        const res = await fetch('http://127.0.0.1:5000/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.token) {
            localStorage.setItem("token", data.token);
            showToast("Login successful!");
            window.location.href = "dashboard.html";
        } else {
            showToast(data.message || "Login failed", "error");
        }

    } catch (error) {
        showToast("Server error", "error");
    }

    toggleLoading(false);
}

// REGISTER
async function register() {
    const username = document.getElementById('reg_username').value;
    const password = document.getElementById('reg_password').value;

    toggleLoading(true);

    try {
        const res = await fetch('http://127.0.0.1:5000/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        showToast(data.message || "Registered!");

        showLogin();

    } catch (error) {
        showToast("Server error", "error");
    }

    toggleLoading(false);
}

function showToast(message, type="success") {
    const toastEl = document.getElementById("toast");

    toastEl.classList.remove("bg-success", "bg-danger");
    toastEl.classList.add(type === "success" ? "bg-success" : "bg-danger");

    document.getElementById("toastMsg").innerText = message;
    
    const toast = new bootstrap.Toast(toastEl, { delay: 1000});
    toast.show();
}

// LOADING UI
function toggleLoading(show) {
    document.getElementById("loading").style.display = show ? "block" : "none";
}

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
