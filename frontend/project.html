<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevTrack - Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #f4f6f9;
}
.navbar {
    background: linear-gradient(90deg, #1e3c72, #2a5298);
}
.card {
    border-radius: 12px;
}
.metric {
    font-size: 28px;
    font-weight: bold;
}
.label {
    color: gray;
}

.chart-wrapper {
    position: relative;
    height: 350px;
    width: 100%;
}

#chart {
    width: 100% !important;
    height: 100% !important;
}

.loading {
    display: none;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">DevTrack Analytics</span>
    <div>
        <button class="btn btn-light me-2" onclick="goBack()">Dashboard</button>
        <button class="btn btn-warning me-2" onclick="deleteProject()">Delete Project</button>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="text-center mt-3 loading" id="loading">
    <div class="spinner-border text-primary"></div>
</div>

<div class="container mt-4">

<h3 id="projectName" class="mb-4"></h3>

<div class="row">
<div class="col-md-4">

<div class="card p-3 mb-3 shadow-sm text-center">
    <div class="label">Total Requests</div>
    <div id="req" class="metric text-primary">0</div>
</div>

<div class="card p-3 mb-3 shadow-sm text-center">
    <div class="label">Error Rate</div>
    <div id="err" class="metric text-danger">0%</div>
</div>

<div class="card p-3 shadow-sm text-center">
    <div class="label">Avg Response Time</div>
    <div id="avg" class="metric text-success">0 ms</div>
</div>

</div>

<!-- RIGHT SIDE -->

<div class="col-md-8">

<!-- CHART -->
<div class="card p-3 shadow-sm">
    <div class="chart-wrapper">
        <canvas id="chart"></canvas>
    </div>
</div>

<!-- 🔥 TOP ENDPOINTS -->
<div class="card p-3 shadow-sm mt-3">
    <h5>Top Endpoints</h5>
    <ul id="topEndpoints" class="list-group mt-2"></ul>
</div>

</div>

</div>

</div>

<!-- TOAST -->

<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
  <div id="toast" class="toast align-items-center text-white bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script>

let token = localStorage.getItem("token");
let projectId = localStorage.getItem("project_id");
let chart;
let isDeleting = false;

if (!token) {
    window.location.href = "login.html";
}

function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}

function goBack() {
    window.location.href = "dashboard.html";
}

function showToast(message, type="success") {
    const toastEl = document.getElementById("toast");

    toastEl.classList.remove("bg-success", "bg-danger");
    toastEl.classList.add(type === "success" ? "bg-success" : "bg-danger");

    document.getElementById("toastMsg").innerText = message;

    const toast = new bootstrap.Toast(toastEl, { delay: 2000 });
    toast.show();
}

function toggleLoading(show) {
    document.getElementById("loading").style.display = show ? "block" : "none";
}

async function getAnalytics() {

    if (isDeleting) return;

    toggleLoading(true);

    try {
        const res = await fetch(`http://127.0.0.1:5000/project_analytics/${projectId}`, {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        const data = await res.json();

        if (!res.ok || data.message) {
            showToast(data.message || "Failed to load analytics", "error");
            toggleLoading(false);
            return;
        }

        document.getElementById("projectName").innerText = data.project;
        document.getElementById("req").innerText = data.total_requests;
        document.getElementById("err").innerText = data.error_rate + "%";
        document.getElementById("avg").innerText = data.avg_response_time + " ms";

        const ctx = document.getElementById('chart').getContext('2d');

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Requests', 'Errors', 'Response Time'],
                datasets: [{
                    data: [
                        data.total_requests,
                        data.error_rate,
                        data.avg_response_time
                    ],
                    backgroundColor: ['#0d6efd', '#dc3545', '#198754']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                }
            }
        });

        // 🔥 TOP ENDPOINTS RENDER
        const list = document.getElementById("topEndpoints");
        list.innerHTML = "";

        if (data.top_endpoints.length === 0) {
            list.innerHTML = "<li class='list-group-item'>No data available</li>";
        } else {
            data.top_endpoints.forEach(item => {
                list.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between">
                        <span>${item.endpoint}</span>
                        <span class="badge bg-primary">${item.count}</span>
                    </li>
                `;
            });
        }

    } catch (error) {
        showToast("Error loading analytics", "error");
    }

    toggleLoading(false);
}

async function deleteProject() {

    if (!projectId) {
        showToast("Project ID missing", "error");
        return;
    }

    if (!confirm("Are you sure you want to delete this project?")) {
        return;
    }

    isDeleting = true;

    toggleLoading(true);

    try {
        const res = await fetch(`http://127.0.0.1:5000/delete_project/${projectId}`, {
            method: 'DELETE',
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        if (res.ok) {
            localStorage.removeItem("project_id");
            window.location.replace("dashboard.html");
        } else {
            const data = await res.json();
            showToast(data.message || "Delete failed", "error");
        }

    } catch (error) {
        showToast("Error deleting project", "error");
    }

    toggleLoading(false);
}

getAnalytics();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
