<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevTrack Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}

.navbar {
    background: linear-gradient(90deg, #1e3c72, #2a5298);
}

.card {
    border-radius: 12px;
}

.project-card {
    transition: 0.3s;
    cursor: pointer;
}

.project-card:hover {
    transform: scale(1.03);
}

.loading {
    display: none;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">DevTrack</span>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
</nav>

<!-- LOADING -->

<div class="text-center mt-3 loading" id="loading">
    <div class="spinner-border text-primary"></div>
</div>

<div class="container mt-4">

<h3 class="mb-3">Your Projects</h3>

<!-- CREATE PROJECT -->
<div class="card p-3 mb-4 shadow-sm">
    <div class="row">
        <div class="col-md-9">
            <input id="projectName" class="form-control" placeholder="Enter project name">
        </div>
        <div class="col-md-3">
            <button class="btn btn-success w-100" onclick="createProject()">Create Project</button>
        </div>
    </div>
</div>
<!-- PROJECT LIST -->
<div class="row" id="projects"></div>

</div>

<!-- TOAST -->  

<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
  <div id="toast" class="toast align-items-center text-white bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script>

let token = localStorage.getItem("token");

// redirect if not logged in
if (!token) {
    window.location.href = "login.html";
}

// logout
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}

// toast
function showToast(message, type="success") {
    const toastEl = document.getElementById("toast");

    toastEl.classList.remove("bg-success", "bg-danger");
    toastEl.classList.add(type === "success" ? "bg-success" : "bg-danger");

    document.getElementById("toastMsg").innerText = message;

    const toast = new bootstrap.Toast(toastEl, { delay: 2000 });
    toast.show();
}

// loading
function toggleLoading(show) {
    document.getElementById("loading").style.display = show ? "block" : "none";
}

// load projects
async function loadProjects() {
    toggleLoading(true);

    try {
        const res = await fetch('http://127.0.0.1:5000/projects', {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        const data = await res.json();

        const container = document.getElementById("projects");
        container.innerHTML = "";

        data.projects.forEach(p => {
            container.innerHTML += `
                <div class="col-md-4">
                    <div class="card p-3 mb-3 shadow-sm project-card" onclick="openProject(${p.id})">
                        <h5>${p.name}</h5>
                        <small class="text-muted">API Key:</small>
                        <div style="font-size:12px; word-break: break-all;">
                            ${p.api_key}
                        </div>
                    </div>
                </div>
            `;
        });

    } catch (error) {
        showToast("Failed to load projects", "error");
    }

    toggleLoading(false);
}

// create project
async function createProject() {
    const name = document.getElementById("projectName").value;

    if (!name) {
        showToast("Enter project name", "error");
        return;
    }

    toggleLoading(true);

    try {
        const res = await fetch('http://127.0.0.1:5000/create_project', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ name })
        });

        const data = await res.json();

        // ❌ if error from backend
        if (!res.ok) {
            showToast(data.message || "Failed to create project", "error");
            toggleLoading(false);
            return;
        }

        // ✅ success case only
        showToast("Project created successfully!");
        showToast("API Key: " + data.api_key);

        document.getElementById("projectName").value = "";

        loadProjects();

    } catch (error) {
        showToast("Server error", "error");
    }

    toggleLoading(false);
}

// open project
function openProject(id) {
    localStorage.setItem("project_id", id);
    window.location.href = "project.html";
}

// load on start
loadProjects();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
